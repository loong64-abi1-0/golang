# This is a basic workflow to help you get started with Actions

name: Download golang and release

# Controls when the workflow will run
on:
  schedule:
    - cron: '0 */6 * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  # 在此处设置默认环境变量（可被工作流调度时覆盖）
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_OWNER: loong64-abi1-0
  GITHUB_REPO: golang

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    permissions:
      contents: write

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      # - uses: actions/checkout@v4

      - name: Install Deps
        run: |
          sudo apt update
          sudo apt install gh jq wget curl -y

      # Runs a single command using the runners shell
      - name: Run a one-line script
        shell: bash
        run: |
          set -e
          # 检查必要工具
          if ! command -v curl &> /dev/null; then
            echo "Error: curl is required but not installed. Exiting."
            exit 1
          fi
          if ! command -v jq &> /dev/null; then
            echo "Error: jq is required but not installed. Exiting."
            exit 1
          fi

          # 环境变量配置 (建议通过环境变量设置)
          GITHUB_TOKEN="${GITHUB_TOKEN:-}"
          GITHUB_OWNER="${GITHUB_OWNER:-}"
          GITHUB_REPO="${GITHUB_REPO:-}"
          FTP_URL="https://ftp.loongnix.cn/toolchain/golang"

          # 验证必要参数
          if [ -z "$GITHUB_TOKEN" ] || [ -z "$GITHUB_OWNER" ] || [ -z "$GITHUB_REPO" ]; then
            echo "Error: Missing required environment variables:"
            echo "  - GITHUB_TOKEN (GitHub personal access token)"
            echo "  - GITHUB_OWNER (GitHub repository owner)"
            echo "  - GITHUB_REPO (GitHub repository name)"
            exit 1
          fi

          echo "🚀 Starting Golang release sync process..."

          # 获取FTP站点版本列表
          echo "🔍 Fetching versions from $FTP_URL..."
          PAGE_CONTENT=$(curl -fsSL --user-agent "Mozilla/5.0 (Windows NT 6.1; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/31.0.1650.63 Safari/537.36" "$FTP_URL")

          # 提取版本号 (匹配 go-X.XX/ 格式)
          VERSIONS_FROM_FTP=$(echo "$PAGE_CONTENT" | grep -o 'href="go-[0-9]\+\.[0-9]\+\(\.[0-9]\+\)\{0,1\}/"' | sed -E 's/href="(go-[0-9.]+)\/".*/\1/')

          if [ -z "$VERSIONS_FROM_FTP" ]; then
            echo "❌ No valid versions found in FTP response. Check FTP structure."
            exit 1
          fi
          VERSIONS_FROM_FTP_ARRAY=(${VERSIONS_FROM_FTP// / })
          echo "✅ Found ${#VERSIONS_FROM_FTP_ARRAY[@]} versions from FTP"

          # 获取GitHub Release列表 (支持分页，最多获取100个)
          echo "🔄 Fetching GitHub releases for $GITHUB_OWNER/$GITHUB_REPO..."
          RELEASES_DATA=$(curl -fsSL -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_OWNER/$GITHUB_REPO/releases?per_page=100")

          # 提取已存在的tag names
          TAG_NAMES=$(echo "$RELEASES_DATA" | jq -r '.[].tag_name')

          TAG_NAMES_ARRAY=(${TAG_NAMES// / })
          echo "✅ Found ${#TAG_NAMES_ARRAY[@]} existing releases in GitHub"

          # 处理每个主版本目录
          for VERSION in $VERSIONS_FROM_FTP; do
            echo "🔍 Scanning patch versions in $VERSION/abi1.0/..."

            # 获取 abi1.0 目录下的文件列表
            ABI_URL="$FTP_URL/$VERSION/abi1.0/"
            ABI_PAGE=$(curl -fsSL --user-agent "Mozilla/5.0 (Windows NT 6.1; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/31.0.1650.63 Safari/537.36" "$ABI_URL")

            # 从文件名中提取补丁版本号 (匹配 goX.Y.Z 格式, 例如 go1.19.11)
            PATCH_VERSIONS=$(echo "$ABI_PAGE" | grep -oE 'href="go[0-9]+\.[0-9]+\.[0-9]+\.' | sed -E 's/href="(go[0-9]+\.[0-9]+\.[0-9]+)\..*/\1/' | sort -u)

            if [ -z "$PATCH_VERSIONS" ]; then
              echo "⚠️  No patch versions found in $ABI_URL. Skipping."
              continue
            fi

            # 处理每个补丁版本
            for PATCH_VERSION in $PATCH_VERSIONS; do
              # 检查该补丁版本是否已存在
              if echo "$TAG_NAMES" | grep -q "^$PATCH_VERSION$"; then
                echo "ℹ️  Patch version $PATCH_VERSION already exists in GitHub. Skipping."
                continue
              fi

              echo "✨ New patch version detected: $PATCH_VERSION"

              # 下载该补丁版本的所有文件
              DOWNLOAD_DIR="./toolchain/golang/$VERSION/abi1.0"
              mkdir -p "$DOWNLOAD_DIR"

              echo "📥 Downloading files for $PATCH_VERSION from $ABI_URL ..."
              # 获取该补丁版本的所有文件名
              PATCH_FILES=$(echo "$ABI_PAGE" | grep -o "href=\"${PATCH_VERSION}\.[^\"]*\"" | sed -E 's/href="([^"]+)".*/\1/')

              if [ -z "$PATCH_FILES" ]; then
                echo "⚠️  No files found for $PATCH_VERSION. Skipping."
                continue
              fi

              DOWNLOAD_SUCCESS=true
              for PATCH_FILE in $PATCH_FILES; do
                FILE_URL="${ABI_URL}${PATCH_FILE}"
                echo "  ↓ $FILE_URL"
                if ! wget --header="User-Agent: Mozilla/5.0 (Windows NT 6.0) AppleWebKit/537.11 (KHTML, like Gecko) Chrome/23.0.1271.97 Safari/537.11" -q -P "$DOWNLOAD_DIR" "$FILE_URL"; then
                  echo "❌ Download failed for $FILE_URL"
                  DOWNLOAD_SUCCESS=false
                  break
                fi
              done

              if [ "$DOWNLOAD_SUCCESS" = false ]; then
                [ -n "$DOWNLOAD_DIR" ] && [ -n "$PATCH_VERSION" ] && rm -f "${DOWNLOAD_DIR:?}/${PATCH_VERSION:?}".*
                continue
              fi

              # 创建GitHub Release (以补丁版本号为tag)
              echo "📝 Creating release for $PATCH_VERSION..."
              gh release create "$PATCH_VERSION" --title "$PATCH_VERSION" --notes "Automated release for $PATCH_VERSION" --repo "$GITHUB_OWNER/$GITHUB_REPO"
              gh release upload "$PATCH_VERSION" "$DOWNLOAD_DIR/$PATCH_VERSION".* --clobber --repo "$GITHUB_OWNER/$GITHUB_REPO"

              # 清理该补丁版本的临时文件
              [ -n "$DOWNLOAD_DIR" ] && [ -n "$PATCH_VERSION" ] && rm -f "${DOWNLOAD_DIR:?}/${PATCH_VERSION:?}".*
            done

            # 清理版本目录
            rm -rf ./toolchain/golang/"$VERSION"
          done

          echo "🎉 Sync process completed!"
